version: "3.9"

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env.production
    depends_on:
      - db
    volumes:
      - ./logs:/app/logs

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: devpulse
      POSTGRES_PASSWORD: devpulse
      POSTGRES_DB: devpulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
